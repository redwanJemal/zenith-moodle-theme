# Development docker-compose — Moodle 4.5 LTS + MariaDB 11
# Uses moodlehq/moodle-php-apache (official dev image) with Moodle source
services:
  moodle:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zenith-moodle-dev
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - MOODLE_DOCKER_DBTYPE=mariadb
      - MOODLE_DOCKER_DBHOST=mariadb
      - MOODLE_DOCKER_DBNAME=moodle
      - MOODLE_DOCKER_DBUSER=moodle
      - MOODLE_DOCKER_DBPASS=moodle_dev
    volumes:
      - moodle_source:/var/www/html
      - zenith_moodledata_dev:/var/www/moodledata
      # Bind mount theme source for live development
      - ../theme/zenith:/var/www/html/theme/zenith
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - zenith-dev

  mariadb:
    image: mariadb:11
    container_name: zenith-mariadb-dev
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root_dev
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_dev
      - MARIADB_DATABASE=moodle
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - zenith_mariadb_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - zenith-dev

volumes:
  moodle_source:
  zenith_moodledata_dev:
  zenith_mariadb_data_dev:

networks:
  zenith-dev:
    driver: bridge
