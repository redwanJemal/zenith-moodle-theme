# Zenith Moodle — Production Deployment (Coolify)
# Traefik routes lms.endlessmaker.com → zenith-moodle:80
# Traefik config: /data/coolify/proxy/dynamic/moodle-lucent.yaml
services:
  moodle:
    build:
      context: ../
      dockerfile: docker/Dockerfile.prod
    container_name: zenith-moodle
    restart: always
    environment:
      - MOODLE_DOCKER_DBHOST=zenith-mariadb
      - MOODLE_DOCKER_DBNAME=${MOODLE_DB_NAME:-moodle}
      - MOODLE_DOCKER_DBUSER=${MOODLE_DB_USER:-moodle}
      - MOODLE_DOCKER_DBPASS=${MOODLE_DB_PASSWORD:-moodle_password}
      - MOODLE_WWWROOT=https://lms.endlessmaker.com
      - MOODLE_SITE_NAME=Zenith LMS
      - MOODLE_SITE_SHORTNAME=zenith
      - MOODLE_ADMIN_USER=${MOODLE_ADMIN_USER:-admin}
      - MOODLE_ADMIN_PASS=${MOODLE_ADMIN_PASS:-Admin123!}
      - MOODLE_ADMIN_EMAIL=${MOODLE_ADMIN_EMAIL:-admin@endlessmaker.com}
    volumes:
      - zenith_moodledata:/var/www/moodledata
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    networks:
      - zenith-internal
      - coolify
    labels:
      - traefik.enable=false

  mariadb:
    image: mariadb:11
    container_name: zenith-mariadb
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-root_password}
      - MARIADB_USER=${MOODLE_DB_USER:-moodle}
      - MARIADB_PASSWORD=${MOODLE_DB_PASSWORD:-moodle_password}
      - MARIADB_DATABASE=${MOODLE_DB_NAME:-moodle}
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - zenith_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - zenith-internal
    labels:
      - traefik.enable=false

volumes:
  zenith_moodledata:
    driver: local
  zenith_mariadb_data:
    driver: local

networks:
  zenith-internal:
    driver: bridge
  coolify:
    external: true
