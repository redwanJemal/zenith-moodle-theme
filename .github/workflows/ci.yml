name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theme/zenith

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: theme/zenith/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint SCSS
        run: npm run lint:scss

      - name: Build AMD modules
        run: npx grunt uglify

      - name: Verify AMD build is up to date
        run: |
          if [ -n "$(git diff --name-only amd/build/)" ]; then
            echo "::error::AMD build is out of date. Run 'npx grunt uglify' and commit the result."
            git diff --stat amd/build/
            exit 1
          fi
